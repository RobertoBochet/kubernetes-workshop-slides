apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: echo-server
spec:
  replicas: 3
  serviceName: echo-server-headless
  selector:
    matchLabels: { app: echo-server }
  template:
    metadata:
      labels: { app: echo-server }
    spec:
      containers:
        - name: echo-server
          image: ealen/echo-server
          ports:
            - name: http
              containerPort: 80
