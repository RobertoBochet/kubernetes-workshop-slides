apiVersion: v1
kind: Pod
metadata:
  name: echo-server
  labels: { app: echo-server }
spec:
  containers:
    - name: echo-server
      image: ealen/echo-server
      command: ["/bin/sh", "-c"]
      args:
        - |
          node webserver &
          sleep 30; kill $!
          sleep infinity
      livenessProbe:
        httpGet:
          port: http
          path: /
        periodSeconds: 5
      ports:
        - name: http
          containerPort: 80
