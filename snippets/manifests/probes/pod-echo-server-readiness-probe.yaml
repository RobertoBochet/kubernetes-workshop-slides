apiVersion: v1
kind: Pod
metadata:
  name: echo-server
  labels: { app: echo-server }
spec:
  containers:
    - name: echo-server
      image: ealen/echo-server
      command: ["/bin/sh", "-c"]
      args:
        - |
          node webserver &
          while true; do
            touch /tmp/ready && sleep 10
            rm /tmp/ready && sleep 10
          done
      readinessProbe:
        exec:
          command: ["cat", "/tmp/ready"]
        periodSeconds: 2
      ports:
        - name: http
          containerPort: 80
