apiVersion: v1
kind: Pod
metadata:
  name: echo-server
  labels: { app: echo-server }
spec:
  containers:
    - name: echo-server
      image: ealen/echo-server
      livenessProbe:
        httpGet:
          port: http
          path: /
        periodSeconds: 15
        initialDelaySeconds: 5
        timeoutSeconds: 5
        failureThreshold: 3
        successThreshold: 1
      ports:
        - name: http
          containerPort: 80
