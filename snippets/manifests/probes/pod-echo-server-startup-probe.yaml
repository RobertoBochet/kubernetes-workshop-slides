apiVersion: v1
kind: Pod
metadata:
  name: echo-server
  labels: { app: echo-server }
spec:
  containers:
    - name: echo-server
      image: ealen/echo-server
      command: ["/bin/sh", "-c"]
      args:
        - |
          [ $((RANDOM%10)) -lt 8 ] &&
          sleep infinity || node webserver
      startupProbe:
        httpGet:
          port: http
          path: /
        failureThreshold: 1
        initialDelaySeconds: 5
      ports:
        - name: http
          containerPort: 80
